services:

  vtchive:
    image: vtchive:latest
    container_name: vtchive
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vtchive:vtchive@localhost:5432/vtchive}
      HOLODEX_TOKEN: ${HOLODEX_TOKEN:-}
    volumes:
      - /volume1/downloads/vtchive:/downloads
